<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spider-Man: Brand New Day Countdown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            position: fixed;
        }
        
        .spidey-bg {
            background: 
                radial-gradient(circle at 40% 50%, rgba(30, 58, 138, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 60% 50%, rgba(185, 28, 28, 0.3) 0%, transparent 50%),
                #020617;
            height: 100%;
            width: 100%;
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        /* Efek Halftone Komik */
        .halftone-overlay {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px);
            background-size: 8px 8px;
            pointer-events: none;
            z-index: 1;
        }

        /* --- Animasi --- */
        @keyframes floatRandom {
            0% { transform: translate(0px, 0px); }
            25% { transform: translate(3px, -5px); }
            50% { transform: translate(-2px, -8px); }
            75% { transform: translate(-4px, -3px); }
            100% { transform: translate(0px, 0px); }
        }

        @keyframes swing {
            0% { transform: rotate(-5deg); transform-origin: top center; }
            50% { transform: rotate(5deg); transform-origin: top center; }
            100% { transform: rotate(-5deg); transform-origin: top center; }
        }

        @keyframes pulseRadioactive {
            0%, 100% { filter: drop-shadow(0 0 5px rgba(239, 68, 68, 0.5)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 20px rgba(239, 68, 68, 0.9)); transform: scale(1.1); }
        }

        @keyframes flickerText {
            0%, 19.999%, 22%, 62.999%, 64%, 64.999%, 70%, 100% {
                opacity: 1;
                text-shadow: 0 0 8px rgba(191, 219, 254, 0.4);
            }
            20%, 21.999%, 63%, 63.999%, 65%, 69.999% {
                opacity: 0.3;
                text-shadow: none;
            }
        }

        @keyframes heavyGlitchBurst {
            0% { transform: scale(1); text-shadow: 0 0 0 transparent; }
            5% { transform: translate(-7px, 4px) skewX(10deg); text-shadow: 6px 0 #ff0000, -6px 0 #0066ff, 3px 3px #ff0000; }
            10% { transform: translate(7px, -4px) skewX(-10deg); text-shadow: -6px 0 #ff0000, 6px 0 #0066ff, -3px -3px #0066ff; }
            15% { transform: translate(-4px, 7px); text-shadow: 8px 0 #ff0000, -8px 0 #0066ff; }
            20% { transform: translate(0); text-shadow: 0 0 0 transparent; }
            45% { transform: translate(4px, -4px); text-shadow: 7px 0 #ff0000, -7px 0 #0066ff; opacity: 0.8; }
            50% { transform: translate(-4px, 4px); text-shadow: -7px 0 #ff0000, 7px 0 #0066ff; }
            55% { transform: translate(0); text-shadow: 0 0 0 transparent; opacity: 1; }
        }

        /* --- Jaring Laba-laba Organik --- */
        .spider-web-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120vmin;
            height: 120vmin;
            pointer-events: none;
            z-index: 1;
            opacity: 0.12;
            animation: rotateWeb 120s linear infinite;
        }

        @keyframes rotateWeb {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* --- Elemen Hiasan --- */
        .hanging-web {
            position: absolute;
            top: -20px;
            width: 2px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.4), rgba(255,255,255,0.05));
            z-index: 2;
            animation: swing 4s ease-in-out infinite;
        }

        .hanging-web::after {
            content: '🕷';
            position: absolute;
            bottom: -15px;
            left: -8px;
            font-size: 14px;
            filter: grayscale(1) brightness(2);
            opacity: 0.6;
        }

        .radioactive-spider {
            position: absolute;
            z-index: 2;
            opacity: 0.15;
            pointer-events: none;
            animation: pulseRadioactive 3s infinite ease-in-out;
        }

        .corner-web {
            position: absolute;
            width: 150px;
            height: 150px;
            opacity: 0.1;
            z-index: 2;
            pointer-events: none;
        }

        .glitch-active {
            animation: floatRandom 8s ease-in-out infinite, heavyGlitchBurst 0.6s ease-in-out forwards !important;
        }

        .spidey-title {
            color: white;
            filter: drop-shadow(0 0 20px rgba(239, 68, 68, 0.4)) drop-shadow(0 0 40px rgba(59, 130, 246, 0.2));
            letter-spacing: -0.05em;
            animation: floatRandom 8s ease-in-out infinite;
            display: inline-block;
        }

        .spidey-subtitle {
            animation: flickerText 5s infinite;
            display: inline-block;
        }

        /* --- MUSIC ENHANCEMENTS --- */
        .music-wrapper {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.5rem;
        }

        .music-hint {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            animation: pulseHint 2s infinite;
        }

        @keyframes pulseHint {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        .music-container {
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.03) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.4rem;
            border-radius: 9999px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .music-control {
            width: 42px;
            height: 42px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .music-control:hover {
            background: rgba(239, 68, 68, 0.2);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
            transform: scale(1.05);
        }

        .music-library {
            position: absolute;
            bottom: calc(100% + 12px);
            right: 0;
            width: 220px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 16px;
            padding: 12px;
            display: none;
            flex-direction: column;
            gap: 6px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            transform-origin: bottom right;
            animation: slideUp 0.3s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .music-library.show { display: flex; }

        .song-item {
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(255, 255, 255, 0.7);
        }

        .song-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .song-item.active { background: rgba(239, 68, 68, 0.15); color: #ef4444; font-weight: bold; }

        .volume-section {
            margin-top: 8px;
            padding: 10px 8px 4px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .volume-slider {
            -webkit-appearance: none;
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #ef4444;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.6);
        }

        .particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 3;
        }

        .web-pattern {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* --- TIMER CARD (Komet Border Effect) --- */
        .timer-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
            z-index: 10;
        }

        .timer-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                transparent, 
                transparent, 
                transparent, 
                rgba(59, 130, 246, 0.8), 
                #ef4444, 
                transparent
            );
            animation: cometRotate 4s linear infinite;
            z-index: -1;
        }

        .timer-card::after {
            content: '';
            position: absolute;
            inset: 2px;
            background: #020617e6;
            border-radius: inherit;
            z-index: -1;
        }

        @keyframes cometRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .number-glow {
            font-variant-numeric: tabular-nums;
            background: linear-gradient(to bottom, #fff 40%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="text-white relative">
    
    <div class="spidey-bg"></div>
    <div class="halftone-overlay"></div>

    <!-- Jaring Laba-laba Organik Baru -->
    <svg class="spider-web-bg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <g fill="none" stroke="white" stroke-width="0.4" stroke-linecap="round">
            <!-- Garis Radial (Benang Utama) -->
            <line x1="100" y1="100" x2="100" y2="0" />
            <line x1="100" y1="100" x2="200" y2="100" />
            <line x1="100" y1="100" x2="100" y2="200" />
            <line x1="100" y1="100" x2="0" y2="100" />
            <line x1="100" y1="100" x2="170" y2="30" />
            <line x1="100" y1="100" x2="170" y2="170" />
            <line x1="100" y1="100" x2="30" y2="170" />
            <line x1="100" y1="100" x2="30" y2="30" />
            <line x1="100" y1="100" x2="140" y2="10" />
            <line x1="100" y1="100" x2="190" y2="60" />
            <line x1="100" y1="100" x2="190" y2="140" />
            <line x1="100" y1="100" x2="140" y2="190" />
            <line x1="100" y1="100" x2="60" y2="190" />
            <line x1="100" y1="100" x2="10" y2="140" />
            <line x1="100" y1="100" x2="10" y2="60" />
            <line x1="100" y1="100" x2="60" y2="10" />

            <!-- Benang Melingkar (Pola Khas Laba-laba) -->
            <!-- Ring 1 -->
            <path d="M100 85 Q110 86 111 91 Q112 100 107 107 Q100 115 91 111 Q84 106 86 96 Q88 88 100 85" opacity="0.8"/>
            <!-- Ring 2 -->
            <path d="M100 70 Q118 72 122 85 Q126 100 115 116 Q100 130 80 122 Q68 114 74 95 Q80 78 100 70" opacity="0.7"/>
            <!-- Ring 3 -->
            <path d="M100 50 Q130 55 140 80 Q150 110 128 140 Q100 160 65 145 Q48 130 55 90 Q65 60 100 50" opacity="0.6"/>
            <!-- Ring 4 -->
            <path d="M100 30 Q145 38 165 75 Q185 120 150 165 Q100 190 40 165 Q15 120 35 70 Q55 40 100 30" opacity="0.5"/>
            <!-- Ring 5 (Outer) -->
            <path d="M100 10 Q160 20 185 70 Q210 130 170 185 Q100 215 25 180 Q-10 125 15 65 Q40 20 100 10" opacity="0.4"/>
        </g>
    </svg>

    <!-- Hiasan Background -->
    <div class="hanging-web" style="left: 15%; height: 180px;"></div>
    <div class="hanging-web" style="left: 85%; height: 120px; animation-delay: -1.5s;"></div>
    
    <svg class="corner-web top-0 left-0" viewBox="0 0 100 100">
        <path d="M0 0 L100 0 M0 0 L0 100 M0 0 L80 20 M0 0 L20 80 M0 0 L50 50" stroke="white" stroke-width="0.5" fill="none"/>
        <path d="M20 0 Q20 20 0 20 M40 0 Q40 40 0 40 M60 0 Q60 60 0 60" stroke="white" stroke-width="0.3" fill="none"/>
    </svg>

    <audio id="bgMusic" loop>
        <source id="musicSource" src="mw.mp3" type="audio/mpeg">
    </audio>

    <div class="music-wrapper">
        <p class="music-hint" id="currentTrackTitle">Music Library</p>
        <div class="music-library" id="libraryMenu">
            <div class="text-[9px] uppercase tracking-widest text-gray-500 mb-2 px-2">Koleksi Musik</div>
            <div class="song-item active" onclick="changeSong('mw.mp3', 'Not perfect - MW', this)">
                <div class="flex items-center gap-2">
                    <svg class="w-3 h-3 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <span>Not perfect - MW</span>
                </div>
                <div class="w-1.5 h-1.5 rounded-full bg-red-500 shadow-[0_0_5px_#ef4444]"></div>
            </div>
            <div class="song-item" onclick="changeSong('helena.mp3', 'Main Theme', this)">
                <div class="flex items-center gap-2"><span>Helena - MCC</span></div>
            </div>
            <div class="volume-section">
                <div id="volumeIcon" class="text-red-500 opacity-80">
                    <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                </div>
                <input type="range" id="volumeControl" class="volume-slider" min="0" max="1" step="0.01" value="0.5">
            </div>
        </div>
        <div class="music-container">
            <div class="music-control" onclick="toggleLibrary()" id="musicBtn">
                <svg id="mainMusicIcon" class="w-5 h-5 fill-white" viewBox="0 0 24 24">
                    <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                </svg>
            </div>
        </div>
    </div>
    
    <canvas id="particleCanvas" class="particles"></canvas>

    <div class="relative z-10 h-full flex flex-col justify-center items-center gap-y-8 md:gap-y-12 px-4">
        <header class="text-center w-full">
            <h1 id="spideyTitle" class="text-5xl md:text-8xl font-[900] spidey-title italic uppercase">Spider-Man</h1>
            <br>
            <h2 class="text-sm md:text-2xl font-light tracking-[0.3em] md:tracking-[0.5em] text-blue-200/60 uppercase spidey-subtitle">Brand New Day</h2>
        </header>

        <main class="w-full flex justify-center">
            <div class="grid grid-cols-4 gap-2 md:gap-4 w-full max-w-2xl mx-auto px-2">
                <div class="timer-card rounded-xl md:rounded-2xl p-2 md:p-6 text-center w-full aspect-square md:aspect-auto flex flex-col justify-center">
                    <span id="days" class="number-glow block text-xl md:text-5xl font-black mb-1">000</span>
                    <span class="text-[7px] md:text-[9px] uppercase tracking-wider text-red-500 font-bold">Hari</span>
                </div>
                <div class="timer-card rounded-xl md:rounded-2xl p-2 md:p-6 text-center w-full aspect-square md:aspect-auto flex flex-col justify-center">
                    <span id="hours" class="number-glow block text-xl md:text-5xl font-black mb-1">00</span>
                    <span class="text-[7px] md:text-[9px] uppercase tracking-wider text-red-500 font-bold">Jam</span>
                </div>
                <div class="timer-card rounded-xl md:rounded-2xl p-2 md:p-6 text-center w-full aspect-square md:aspect-auto flex flex-col justify-center">
                    <span id="minutes" class="number-glow block text-xl md:text-5xl font-black mb-1">00</span>
                    <span class="text-[7px] md:text-[9px] uppercase tracking-wider text-red-500 font-bold">Menit</span>
                </div>
                <div class="timer-card rounded-xl md:rounded-2xl p-2 md:p-6 text-center w-full aspect-square md:aspect-auto flex flex-col justify-center">
                    <span id="seconds" class="number-glow block text-xl md:text-5xl font-black mb-1 text-red-500">00</span>
                    <span class="text-[7px] md:text-[9px] uppercase tracking-wider text-red-500 font-bold">Detik</span>
                </div>
            </div>
        </main>

        <footer class="text-center w-full">
            <p class="text-gray-400 text-xs md:text-base mb-4 max-w-xs mx-auto font-light italic px-4">"program ini gweh buat dengan sepenuh hati ✌"</p>
            <div class="flex items-center justify-center space-x-4 mb-4">
                <div class="h-[1px] w-10 bg-gradient-to-r from-transparent to-red-600"></div>
                <p class="text-[10px] text-gray-500 tracking-[0.3em] uppercase font-bold">31 Juli 2026</p>
                <div class="h-[1px] w-10 bg-gradient-to-l from-transparent to-blue-600"></div>
            </div>
            <p class="text-[9px] text-white/20 tracking-widest uppercase">Developed for u</p>
        </footer>
    </div>

    <script>
        const music = document.getElementById('bgMusic');
        const libraryMenu = document.getElementById('libraryMenu');
        const currentTrackTitle = document.getElementById('currentTrackTitle');
        const volumeControl = document.getElementById('volumeControl');
        const volumeIcon = document.getElementById('volumeIcon');
        const spideyTitle = document.getElementById('spideyTitle');
        const musicSource = document.getElementById('musicSource');
        const mainMusicIcon = document.getElementById('mainMusicIcon');

        music.volume = 0.5;

        function toggleLibrary() {
            const isShowing = libraryMenu.classList.contains('show');
            libraryMenu.classList.toggle('show');
            mainMusicIcon.style.transform = isShowing ? 'rotate(0deg)' : 'rotate(15deg) scale(1.1)';
        }

        function updateVolumeIcon(val) {
            volumeIcon.innerHTML = val == 0 ? 
                '<svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>' : 
                '<svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>';
        }

        function changeSong(src, title, element) {
            document.querySelectorAll('.song-item').forEach(item => {
                item.classList.remove('active');
                const dot = item.querySelector('.w-1.5');
                if(dot) dot.remove();
            });
            element.classList.add('active');
            element.insertAdjacentHTML('beforeend', '<div class="w-1.5 h-1.5 rounded-full bg-red-500"></div>');
            musicSource.src = src;
            currentTrackTitle.innerText = title;
            music.load();
            music.play();
        }

        function triggerGlitch() {
            spideyTitle.classList.add('glitch-active');
            setTimeout(() => {
                spideyTitle.classList.remove('glitch-active');
                setTimeout(triggerGlitch, Math.random() * 4000 + 4000);
            }, 600);
        }
        setTimeout(triggerGlitch, 3000);

        volumeControl.addEventListener('input', (e) => {
            music.volume = e.target.value;
            updateVolumeIcon(e.target.value);
        });

        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.speedY = (Math.random() - 0.5) * 0.4;
                this.opacity = Math.random() * 0.5;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
                if (this.y > canvas.height || this.y < 0) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        function initParticles() {
            for (let i = 0; i < 80; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        const releaseDate = new Date("July 31, 2026 00:00:00").getTime();
        const updateCountdown = () => {
            const now = new Date().getTime();
            const distance = releaseDate - now;
            if (distance < 0) return;
            document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = String(Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
            document.getElementById("minutes").innerText = String(Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
            document.getElementById("seconds").innerText = String(Math.floor((distance % (1000 * 60)) / 1000)).padStart(2, '0');
        };

        window.onload = function() {
            resize(); initParticles(); animate();
            setInterval(updateCountdown, 1000); updateCountdown();
        };
        window.addEventListener('resize', resize);
    </script>
</body>
</html>
