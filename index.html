<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spider-Man: Brand New Day Countdown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            position: fixed;
        }
        
        .spidey-bg {
            background: 
                radial-gradient(circle at 50% 50%, rgba(30, 58, 138, 0.3) 0%, transparent 70%),
                radial-gradient(circle at 50% 80%, rgba(185, 28, 28, 0.2) 0%, transparent 60%),
                #020617;
            height: 100%;
            width: 100%;
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        @keyframes floatRandom {
            0% { transform: translate(0px, 0px); }
            25% { transform: translate(3px, -5px); }
            50% { transform: translate(-2px, -8px); }
            75% { transform: translate(-4px, -3px); }
            100% { transform: translate(0px, 0px); }
        }

        @keyframes heavyGlitchBurst {
            0% { transform: scale(1); text-shadow: 0 0 0 transparent; }
            5% { transform: translate(-7px, 4px) skewX(10deg); text-shadow: 6px 0 #ff0000, -6px 0 #0066ff, 3px 3px #ff0000; }
            10% { transform: translate(7px, -4px) skewX(-10deg); text-shadow: -6px 0 #ff0000, 6px 0 #0066ff, -3px -3px #0066ff; }
            20% { transform: translate(0); text-shadow: 0 0 0 transparent; }
        }

        .glitch-active {
            animation: floatRandom 8s ease-in-out infinite, heavyGlitchBurst 0.6s ease-in-out forwards !important;
        }

        .spidey-title {
            color: white;
            filter: drop-shadow(0 0 20px rgba(239, 68, 68, 0.4));
            letter-spacing: -0.05em;
            animation: floatRandom 8s ease-in-out infinite;
            display: inline-block;
        }

        .spider-web-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: center;
            width: 100vmin; 
            height: 100vmin;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><g fill="none" stroke="white" stroke-width="0.2" opacity="0.05"><circle cx="50" cy="50" r="10"/><circle cx="50" cy="50" r="20"/><circle cx="50" cy="50" r="30"/><circle cx="50" cy="50" r="40"/><circle cx="50" cy="50" r="50"/><line x1="50" y1="0" x2="50" y2="100"/><line x1="0" y1="50" x2="100" y2="50"/><line x1="15" y1="15" x2="85" y2="85"/><line x1="85" y1="15" x2="15" y2="85"/></g></svg>') no-repeat center;
            background-size: contain;
            pointer-events: none;
            z-index: 1;
            animation: rotateWeb 60s linear infinite;
        }

        @keyframes rotateWeb {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .music-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            width: 100%;
        }

        .music-container {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.35rem;
            border-radius: 9999px;
        }

        .music-info-group {
            max-width: 0;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            opacity: 0;
        }

        .music-info-group.active {
            max-width: 140px;
            padding: 0 1rem 0 0.5rem;
            opacity: 1;
        }

        .volume-slider {
            -webkit-appearance: none;
            width: 60px;
            height: 2px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            background: #ef4444;
            border-radius: 50%;
            cursor: pointer;
        }

        .music-control {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .timer-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.03) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: relative;
            z-index: 10;
        }

        .number-glow {
            font-variant-numeric: tabular-nums;
            background: linear-gradient(to bottom, #fff 40%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="text-white relative">
    
    <div class="spidey-bg"></div>

    <audio id="bgMusic" loop>
        <source src="helena.mp3" type="audio/mpeg">
    </audio>

    <div class="spider-web-bg"></div>
    <canvas id="particleCanvas" class="absolute inset-0 pointer-events-none z-[2]"></canvas>

    <div class="relative z-10 h-full flex flex-col items-center overflow-hidden px-4">
        
        <!-- Header -->
        <header class="text-center w-full pt-12 md:pt-20 shrink-0">
            <h1 id="spideyTitle" class="text-5xl md:text-8xl font-[900] spidey-title italic uppercase">
                Spider-Man
            </h1>
            <div class="mt-1">
                <h2 class="text-[9px] md:text-xl font-light tracking-[0.4em] text-blue-200/40 uppercase italic">
                    Brand New Day
                </h2>
            </div>
        </header>

        <!-- Main Countdown (Tepat di tengah layar) -->
        <main class="w-full flex-grow flex items-center justify-center py-4">
            <div class="grid grid-cols-4 gap-2 md:gap-6 w-full max-w-2xl justify-items-center">
                <div class="timer-card rounded-xl md:rounded-2xl p-3 md:p-8 text-center w-full aspect-square flex flex-col justify-center">
                    <span id="days" class="number-glow block text-xl md:text-5xl font-black">000</span>
                    <span class="text-[6px] md:text-[9px] uppercase tracking-wider text-red-500/80 font-bold mt-1">Hari</span>
                </div>
                <div class="timer-card rounded-xl md:rounded-2xl p-3 md:p-8 text-center w-full aspect-square flex flex-col justify-center">
                    <span id="hours" class="number-glow block text-xl md:text-5xl font-black">00</span>
                    <span class="text-[6px] md:text-[9px] uppercase tracking-wider text-red-500/80 font-bold mt-1">Jam</span>
                </div>
                <div class="timer-card rounded-xl md:rounded-2xl p-3 md:p-8 text-center w-full aspect-square flex flex-col justify-center">
                    <span id="minutes" class="number-glow block text-xl md:text-5xl font-black">00</span>
                    <span class="text-[6px] md:text-[9px] uppercase tracking-wider text-red-500/80 font-bold mt-1">Menit</span>
                </div>
                <div class="timer-card rounded-xl md:rounded-2xl p-3 md:p-8 text-center w-full aspect-square flex flex-col justify-center border-red-900/10">
                    <span id="seconds" class="number-glow block text-xl md:text-5xl font-black text-red-500">00</span>
                    <span class="text-[6px] md:text-[9px] uppercase tracking-wider text-red-500/80 font-bold mt-1">Detik</span>
                </div>
            </div>
        </main>

        <!-- Footer Area -->
        <footer class="text-center w-full shrink-0 pb-10 flex flex-col items-center">
            
            <!-- Teks & Tanggal rilis di atas tombol play -->
            <p class="text-gray-400 text-[10px] md:text-sm mb-3 font-light italic opacity-50">
                "program ini gweh buat dengan sepenuh hati ✌"
            </p>

            <div class="flex items-center justify-center space-x-3 mb-6 opacity-40">
                <div class="h-[1px] w-6 bg-white/30"></div>
                <p class="text-[8px] tracking-[0.2em] uppercase">31 Juli 2026</p>
                <div class="h-[1px] w-6 bg-white/30"></div>
            </div>

            <!-- Tombol Play di paling bawah -->
            <div class="music-wrapper">
                <div class="music-container">
                    <div id="musicControls" class="music-info-group">
                        <input type="range" id="volumeControl" class="volume-slider" min="0" max="1" step="0.1" value="0.5">
                    </div>
                    <div class="music-control" onclick="toggleMusic()" id="musicBtn">
                        <svg id="playIcon" class="w-3 h-3 fill-white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        <svg id="pauseIcon" class="hidden w-3 h-3 fill-white" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </div>
                </div>
                <p class="text-[7px] text-white/10 tracking-widest uppercase mt-3">Web Integrated Project</p>
            </div>
        </footer>
    </div>

    <script>
        const music = document.getElementById('bgMusic');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const musicControls = document.getElementById('musicControls');
        const volumeControl = document.getElementById('volumeControl');
        const spideyTitle = document.getElementById('spideyTitle');

        music.volume = 0.5;

        function triggerGlitch() {
            spideyTitle.classList.add('glitch-active');
            setTimeout(() => {
                spideyTitle.classList.remove('glitch-active');
                setTimeout(triggerGlitch, Math.random() * 5000 + 3000);
            }, 600);
        }
        setTimeout(triggerGlitch, 3000);

        volumeControl.addEventListener('input', (e) => music.volume = e.target.value);

        function toggleMusic() {
            if (music.paused) {
                music.play();
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
                musicControls.classList.add('active');
            } else {
                music.pause();
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
                musicControls.classList.remove('active');
            }
        }

        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.2;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.4;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        function initParticles() {
            particles = Array.from({ length: 50 }, () => new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        const releaseDate = new Date("July 31, 2026 00:00:00").getTime();

        const updateCountdown = () => {
            const now = new Date().getTime();
            const distance = releaseDate - now;
            if (distance < 0) return;
            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);
            document.getElementById("days").innerText = d;
            document.getElementById("hours").innerText = String(h).padStart(2, '0');
            document.getElementById("minutes").innerText = String(m).padStart(2, '0');
            document.getElementById("seconds").innerText = String(s).padStart(2, '0');
        };

        window.onload = function() {
            resize(); initParticles(); animate();
            setInterval(updateCountdown, 1000); updateCountdown();
        };

        window.addEventListener('resize', resize);
    </script>
</body>
</html>
