<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider-Man: Brand New Day Countdown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            overflow: hidden;
        }
        
        .spidey-bg {
            background: 
                radial-gradient(circle at 40% 50%, rgba(30, 58, 138, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 60% 50%, rgba(185, 28, 28, 0.3) 0%, transparent 50%),
                #020617;
        }

        @keyframes floatRandom {
            0% { transform: translate(0px, 0px); }
            25% { transform: translate(3px, -5px); }
            50% { transform: translate(-2px, -8px); }
            75% { transform: translate(-4px, -3px); }
            100% { transform: translate(0px, 0px); }
        }

        @keyframes floatRandomSlow {
            0% { transform: translate(0px, 0px); }
            33% { transform: translate(-3px, 4px); }
            66% { transform: translate(2px, -4px); }
            100% { transform: translate(0px, 0px); }
        }

        /* --- EFEK GLITCH BARU --- */
        @keyframes heavyGlitchBurst {
            0% { transform: scale(1); text-shadow: 0 0 0 transparent; }
            5% { transform: translate(-7px, 4px) skewX(10deg); text-shadow: 6px 0 #ff0000, -6px 0 #0066ff, 3px 3px #ff0000; }
            10% { transform: translate(7px, -4px) skewX(-10deg); text-shadow: -6px 0 #ff0000, 6px 0 #0066ff, -3px -3px #0066ff; }
            15% { transform: translate(-4px, 7px); text-shadow: 8px 0 #ff0000, -8px 0 #0066ff; }
            20% { transform: translate(0); text-shadow: 0 0 0 transparent; }
            45% { transform: translate(4px, -4px); text-shadow: 7px 0 #ff0000, -7px 0 #0066ff; opacity: 0.8; }
            50% { transform: translate(-4px, 4px); text-shadow: -7px 0 #ff0000, 7px 0 #0066ff; }
            55% { transform: translate(0); text-shadow: 0 0 0 transparent; opacity: 1; }
        }

        .glitch-active {
            animation: floatRandom 8s ease-in-out infinite, heavyGlitchBurst 0.6s ease-in-out forwards !important;
        }
        /* ------------------------ */

        .spidey-title {
            color: white;
            filter: drop-shadow(0 0 20px rgba(239, 68, 68, 0.4)) drop-shadow(0 0 40px rgba(59, 130, 246, 0.2));
            letter-spacing: -0.05em;
            animation: floatRandom 8s ease-in-out infinite;
            display: inline-block;
        }

        .spidey-subtitle {
            animation: floatRandomSlow 10s ease-in-out infinite;
            display: inline-block;
        }

        .spider-web-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: center;
            width: 110vh;
            height: 110vh;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><g fill="none" stroke="white" stroke-width="0.2" opacity="0.08"><circle cx="50" cy="50" r="10"/><circle cx="50" cy="50" r="20"/><circle cx="50" cy="50" r="30"/><circle cx="50" cy="50" r="40"/><circle cx="50" cy="50" r="50"/><line x1="50" y1="0" x2="50" y2="100"/><line x1="0" y1="50" x2="100" y2="50"/><line x1="15" y1="15" x2="85" y2="85"/><line x1="85" y1="15" x2="15" y2="85"/><line x1="30" y1="0" x2="70" y2="100"/><line x1="70" y1="0" x2="30" y2="100"/><line x1="0" y1="30" x2="100" y2="70"/><line x1="0" y1="70" x2="100" y2="30"/></g></svg>') no-repeat center;
            background-size: contain;
            pointer-events: none;
            z-index: 1;
            animation: rotateWeb 60s linear infinite;
        }

        @keyframes rotateWeb {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .music-wrapper {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.75rem;
        }

        .music-hint {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            animation: pulseHint 2s infinite;
        }

        @keyframes pulseHint {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        .music-container {
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.03) 100%);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.5rem;
            border-radius: 9999px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .music-container:hover {
            border-color: rgba(239, 68, 68, 0.5);
            transform: translateY(-2px);
        }

        .music-info-group {
            max-width: 0;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 1rem;
            opacity: 0;
        }

        .music-info-group.active {
            max-width: 300px;
            padding: 0 1.25rem 0 0.5rem;
            opacity: 1;
        }

        .music-info {
            white-space: nowrap;
            font-size: 11px;
            color: white;
        }

        .volume-slider {
            -webkit-appearance: none;
            width: 80px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #ef4444;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        }

        .music-control {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .music-control::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(239, 68, 68, 0.8), transparent);
            animation: scan 3s linear infinite;
        }

        .music-control:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.5);
        }

        .particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 2;
        }

        .web-pattern {
            background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .timer-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.03) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        .timer-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(239, 68, 68, 0.8), transparent);
            animation: scan 3s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .timer-card:hover {
            border-color: rgba(59, 130, 246, 0.5);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.2);
        }

        .number-glow {
            font-variant-numeric: tabular-nums;
            background: linear-gradient(to bottom, #fff 40%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col justify-between spidey-bg relative">
    
    <audio id="bgMusic" loop>
        <source src="c:\Users\fathi\Downloads\MW x BrianVal x LyoraChay - Not Perfect [Official Lyric Video] - LyoraChay.mp3" type="audio/mpeg">
    </audio>

    <div class="music-wrapper">
        <p class="music-hint">Not perfect - MW, lyoraChay, BrianVal</p>
        <div class="music-container">
            <div id="musicControls" class="music-info-group">
                <div class="music-info italic opacity-80">Volume</div>
                <input type="range" id="volumeControl" class="volume-slider" min="0" max="1" step="0.1" value="0.5">
            </div>
            <div class="music-control" onclick="toggleMusic()" id="musicBtn">
                <svg id="playIcon" class="w-4 h-4 fill-white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pauseIcon" class="hidden w-4 h-4 fill-white" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </div>
        </div>
    </div>
    
    <div class="spider-web-bg"></div>
    <div class="absolute inset-0 web-pattern pointer-events-none opacity-60"></div>
    <canvas id="particleCanvas" class="particles"></canvas>

    <header class="relative z-10 pt-32 md:pt-24 px-6 text-center">
        <div class="inline-block">
            <h1 id="spideyTitle" class="text-5xl md:text-8xl font-900 spidey-title italic uppercase">
                Spider-Man
            </h1>
        </div>
        <br>
        <div class="inline-block">
            <h2 class="text-sm md:text-2xl font-light tracking-[0.3em] md:tracking-[0.5em] text-blue-200/40 uppercase spidey-subtitle">
                Brand New Day
            </h2>
        </div>
    </header>

    <main class="relative z-20 px-4 py-8">
        <div class="max-w-4xl mx-auto">
            <div class="grid grid-cols-4 gap-2 md:gap-6 max-w-2xl mx-auto">
                <div class="timer-card rounded-xl md:rounded-2xl p-2 md:p-6 text-center group">
                    <span id="days" class="number-glow block text-xl md:text-5xl font-black mb-1 tracking-tight">000</span>
                    <span class="text-[7px] md:text-[9px] uppercase tracking-wider text-red-500 font-bold group-hover:text-blue-400 transition-colors">Hari</span>
                </div>
                <div class="timer-card rounded-xl md:rounded-2xl p-2 md:p-6 text-center group">
                    <span id="hours" class="number-glow block text-xl md:text-5xl font-black mb-1">00</span>
                    <span class="text-[7px] md:text-[9px] uppercase tracking-wider text-red-500 font-bold group-hover:text-blue-400 transition-colors">Jam</span>
                </div>
                <div class="timer-card rounded-xl md:rounded-2xl p-2 md:p-6 text-center group">
                    <span id="minutes" class="number-glow block text-xl md:text-5xl font-black mb-1">00</span>
                    <span class="text-[7px] md:text-[9px] uppercase tracking-wider text-red-500 font-bold group-hover:text-blue-400 transition-colors">Menit</span>
                </div>
                <div class="timer-card rounded-xl md:rounded-2xl p-2 md:p-6 text-center group border-red-900/30">
                    <span id="seconds" class="number-glow block text-xl md:text-5xl font-black mb-1 text-red-500">00</span>
                    <span class="text-[7px] md:text-[9px] uppercase tracking-wider text-red-500 font-bold">Detik</span>
                </div>
            </div>
        </div>
    </main>

    <footer class="relative z-10 pb-16 px-6 text-center">
        <p class="mt-4 text-gray-400 text-xs md:text-base mb-6 md:mb-10 max-w-xs mx-auto font-light italic">
            "program ini gweh buat dengan sepenuh hati"
        </p>
        <div class="flex items-center justify-center space-x-4 mb-6">
            <div class="h-[1px] w-12 bg-gradient-to-r from-transparent to-red-600"></div>
            <p class="text-[10px] text-gray-500 tracking-[0.3em] uppercase font-bold">31 Juli 2026</p>
            <div class="h-[1px] w-12 bg-gradient-to-l from-transparent to-blue-600"></div>
        </div>
        <p class="text-[9px] text-white/20 tracking-widest uppercase">
            Developed for Fathir
        </p>
    </footer>

    <script>
        const music = document.getElementById('bgMusic');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const musicControls = document.getElementById('musicControls');
        const volumeControl = document.getElementById('volumeControl');
        const spideyTitle = document.getElementById('spideyTitle');

        // Pengaturan volume awal
        music.volume = 0.5;

        // Logic Glitch Terintegrasi
        function triggerGlitch() {
            spideyTitle.classList.add('glitch-active');
            setTimeout(() => {
                spideyTitle.classList.remove('glitch-active');
                // Picu glitch lagi secara acak antara 4-8 detik
                const nextGlitch = Math.random() * 4000 + 4000;
                setTimeout(triggerGlitch, nextGlitch);
            }, 600); // Durasi animasi glitch
        }
        // Mulai glitch pertama setelah 3 detik
        setTimeout(triggerGlitch, 3000);

        // Script untuk mengatur volume
        volumeControl.addEventListener('input', (e) => {
            music.volume = e.target.value;
        });

        function toggleMusic() {
            if (music.paused) {
                music.play();
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
                musicControls.classList.add('active');
            } else {
                music.pause();
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
                musicControls.classList.remove('active');
            }
        }

        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.speedY = (Math.random() - 0.5) * 0.4;
                this.opacity = Math.random() * 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 150; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.onload = function() {
            resize();
            initParticles();
            animate();
            updateCountdown();
        };

        window.addEventListener('resize', resize);

        const releaseDate = new Date("July 31, 2026 00:00:00").getTime();

        const updateCountdown = () => {
            const now = new Date().getTime();
            const distance = releaseDate - now;

            if (distance < 0) {
                document.querySelector("main").innerHTML = "<h2 class='text-4xl font-bold text-red-600 animate-pulse'>SUDAH TAYANG!</h2>";
                return;
            }

            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d;
            document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
            document.getElementById("minutes").innerText = m < 10 ? "0" + m : m;
            document.getElementById("seconds").innerText = s < 10 ? "0" + s : s;
        };

        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
